<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="calculadora">

        <section class="pantalla">

            <div class="historial"></div>

            <div class="resultado">0</div>

        </section>

        <section class="teclado">
            
        <button class="btn especial" data-valor="AC">AC</button>
        <button class="btn especial" data-valor="DEL">DEL</button>
        <button class="btn especial" data-valor="%">%</button>
        <button class="btn operador" data-valor="/">÷</button>

        <button class="btn numero" data-valor="7">7</button>
        <button class="btn numero" data-valor="8">8</button>
        <button class="btn numero" data-valor="9">9</button>
        <button class="btn operador" data-valor="*">×</button>

        <button class="btn numero" data-valor="4">4</button>
        <button class="btn numero" data-valor="5">5</button>
        <button class="btn numero" data-valor="6">6</button>
        <button class="btn operador" data-valor="-">-</button>

        <button class="btn numero" data-valor="1">1</button>
        <button class="btn numero" data-valor="2">2</button>
        <button class="btn numero" data-valor="3">3</button>
        <button class="btn operador" data-valor="+">+</button>

        <button class="btn especial" data-valor="+/-">+/-</button>
        <button class="btn numero" data-valor="0">0</button>
        <button class="btn especial" data-valor=".">.</button>
        <button class="btn igual" data-valor="=">=</button>

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
